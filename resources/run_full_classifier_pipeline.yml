resources:
  jobs:
    run_full_classifier_pipeline:
      name: "run_full_classifier_pipeline"
      tasks:
        - task_key: run_create_dummy_data
          run_job_task:
            job_id: ${resources.jobs.create_dummy_data.id}
        - task_key: run_train_classifier_a
          depends_on:
            - task_key: run_create_dummy_data
          run_job_task:
            job_id: ${resources.jobs.train_classifier_a.id}
        - task_key: run_train_classifier_b
          depends_on:
            - task_key: run_create_dummy_data
          run_job_task:
            job_id: ${resources.jobs.train_classifier_b.id}
        - task_key: run_train_classifier_catboost
          depends_on:
            - task_key: run_create_dummy_data
          run_job_task:
            job_id: ${resources.jobs.train_classifier_catboost.id}
        - task_key: run_train_classifier_lightgbm
          depends_on:
            - task_key: run_create_dummy_data
          run_job_task:
            job_id: ${resources.jobs.train_classifier_lightgbm.id}
        - task_key: run_deploy_classifier_endpoint
          depends_on:
            - task_key: run_train_classifier_a
            - task_key: run_train_classifier_b
            - task_key: run_train_classifier_catboost
            - task_key: run_train_classifier_lightgbm
          run_job_task:
            job_id: ${resources.jobs.deploy_classifier_endpoint.id}
