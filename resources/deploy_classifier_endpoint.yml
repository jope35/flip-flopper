resources:
  jobs:
    deploy_classifier_endpoint:
      name: "deploy_classifier_endpoint"
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${resources.schemas.default.name}
        - name: registered_model_suffix
          default: ${var.classifier_registered_model_suffix}
        - name: endpoint_name
          default: ${var.classifier_serving_endpoint_name}
        - name: alias_a
          default: ${var.classifier_alias_champion}
        - name: alias_b
          default: ${var.classifier_alias_challenger}
        - name: alias_c
          default: ${var.classifier_alias_catboost}
        - name: alias_d
          default: ${var.classifier_alias_lightgbm}
        - name: traffic_a
          default: ${var.classifier_traffic_pct_champion}
        - name: traffic_b
          default: ${var.classifier_traffic_pct_challenger}
        - name: traffic_c
          default: ${var.classifier_traffic_pct_catboost}
        - name: traffic_d
          default: ${var.classifier_traffic_pct_lightgbm}
        - name: workload_size
          default: ${var.classifier_serving_workload_size}
        - name: scale_to_zero
          default: ${var.classifier_serving_scale_to_zero}
      environments:
        - environment_key: deploy_serving_env
          spec:
            environment_version: "5"
            dependencies:
              - ../dist/*.whl
      tasks:
        - task_key: deploy_classifier_endpoint
          environment_key: deploy_serving_env
          spark_python_task:
            python_file: ../src/jobs/deploy_classifier_endpoint.py
            parameters:
              - "--catalog"
              - "{{job.parameters.catalog}}"
              - "--schema"
              - "{{job.parameters.schema}}"
              - "--registered-model-suffix"
              - "{{job.parameters.registered_model_suffix}}"
              - "--endpoint-name"
              - "{{job.parameters.endpoint_name}}"
              - "--alias-a"
              - "{{job.parameters.alias_a}}"
              - "--alias-b"
              - "{{job.parameters.alias_b}}"
              - "--alias-c"
              - "{{job.parameters.alias_c}}"
              - "--alias-d"
              - "{{job.parameters.alias_d}}"
              - "--traffic-a"
              - "{{job.parameters.traffic_a}}"
              - "--traffic-b"
              - "{{job.parameters.traffic_b}}"
              - "--traffic-c"
              - "{{job.parameters.traffic_c}}"
              - "--traffic-d"
              - "{{job.parameters.traffic_d}}"
              - "--workload-size"
              - "{{job.parameters.workload_size}}"
              - "--scale-to-zero"
              - "{{job.parameters.scale_to_zero}}"
