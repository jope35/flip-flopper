resources:
  jobs:
    create_dummy_data:
      name: create_dummy_data
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${resources.schemas.data.name}
        - name: table_name
          default: ${var.table_name}
      environments:
        - environment_key: dummy_data_env
          spec:
            client: "4"
            dependencies:
              - pandas
              - scikit-learn
      tasks:
        - task_key: create_dummy_data
          environment_key: dummy_data_env
          notebook_task:
            notebook_path: ../src/jobs/create_dummy_data.ipynb
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
              table_name: "{{job.parameters.table_name}}"
