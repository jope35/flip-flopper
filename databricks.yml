bundle:
  name: flip-flopper-serving-ab-test

include:
  - resources/*.yml

scripts:
  update_endpoint_split:
    content: uv run python scripts/bundle-run/update_endpoint_split.py

artifacts:
  flip_flopper:
    type: whl
    path: .
    build: uv build --wheel
    dynamic_version: true
    files:
      - source: ./dist/*.whl

variables:
  catalog:
    default: workspace
  dummy_data_table_name:
    default: generated_data
  classifier_experiment_name:
    default: flip_flopper_classifier
  classifier_serving_endpoint_name:
    default: flip_flopper_classifier_endpoint
  classifier_registered_model_suffix:
    default: ${var.classifier_experiment_name}
  classifier_alias_champion:
    default: Champion
  classifier_alias_challenger:
    default: Challenger
  classifier_alias_catboost:
    default: Champion
  classifier_alias_lightgbm:
    default: Champion
  classifier_traffic_pct_champion:
    default: "25"
  classifier_traffic_pct_challenger:
    default: "25"
  classifier_traffic_pct_catboost:
    default: "25"
  classifier_traffic_pct_lightgbm:
    default: "25"
  classifier_serving_workload_size:
    default: Small
  classifier_serving_scale_to_zero:
    default: "true"

resources:
  schemas:
    default:
      name: flip_flopper
      catalog_name: ${var.catalog}
      lifecycle:
        prevent_destroy: false


targets:
  dev:
    default: true
    workspace:
      host: https://dbc-0f232e4d-3ed4.cloud.databricks.com
 