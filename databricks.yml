bundle:
  name: flip-flopper-serving-ab-test

include:
  - resources/*.yml

variables:
  catalog:
    default: main
  schema:
    default: serving
  endpoint_name:
    default: flip-flopper-dev
  app_config_path:
    default: config/app.yaml
  controller_cron:
    default: "0 0 * * * ?"
  catboost_experiment_name:
    default: /Shared/flip-flopper/catboost-demo

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://dbc-b9d925fd-a82e.cloud.databricks.com
  prod:
    mode: production
    workspace:
      host: https://dbc-b9d925fd-a82e.cloud.databricks.com
