# This is a Databricks asset bundle definition for flip_flopper.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: flip_flopper
  uuid: e101c59d-6567-46f6-a51f-50684ec73d29

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: UC schema for data tables
    default: data
  model_schema:
    description: UC schema for registered models
    default: model
  table_name:
    description: Table name for generated dummy data
    default: generated_data
  model_name:
    description: Registered model name for logistic regression ONNX artifact
    default: logistic_regression_onnx
  lightgbm_model_name:
    description: Registered model name for LightGBM ONNX artifact
    default: lightgbm_onnx
  pytorch_mlp_model_name:
    description: Registered model name for PyTorch MLP ONNX artifact
    default: pytorch_mlp_onnx
  serving_endpoint_name:
    description: Model Serving endpoint name for the 3-model traffic split
    default: flip_flopper_serving

resources:
  schemas:
    data:
      name: ${var.schema}
      catalog_name: ${var.catalog}
    model:
      name: ${var.model_schema}
      catalog_name: ${var.catalog}

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-b9d925fd-a82e.cloud.databricks.com
    variables:
      catalog: workspace
      schema: data
      model_schema: model
  prod:
    mode: production
    workspace:
      host: https://dbc-b9d925fd-a82e.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/sweet.goose5360@fastmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/sweet.goose5360@fastmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: data
      model_schema: model
    permissions:
      - user_name: sweet.goose5360@fastmail.com
        level: CAN_MANAGE
