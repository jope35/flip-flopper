# This is a Databricks asset bundle definition for flip_flopper.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: flip_flopper
  uuid: e101c59d-6567-46f6-a51f-50684ec73d29

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-b9d925fd-a82e.cloud.databricks.com
    variables:
      catalog: workspace
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-b9d925fd-a82e.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/sweet.goose5360@fastmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/sweet.goose5360@fastmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: sweet.goose5360@fastmail.com
        level: CAN_MANAGE
