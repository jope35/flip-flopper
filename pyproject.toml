[project]
name = "flip-flopper"
version = "0.1.0"
description = "Databricks serving A/B test controller"
requires-python = ">=3.11"
dependencies = [
  "databricks-sdk>=0.57.0",
  "pydantic>=2.11.0",
]

[dependency-groups]
dev = [
  "pytest>=8.3.5",
  "ruff>=0.11.0",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
